[tool.pytest.ini_options]
testpaths = ["services", "ml", "shared"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --cov=. --cov-report=html --cov-report=term-missing"
asyncio_mode = "auto"
markers = [
    "integration: marks tests as integration tests (require running infra)",
    "slow: marks tests as slow-running",
    "ml: marks tests as ML model tests",
    "unit: marks tests as unit tests",
]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["services", "ml", "shared"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM", "RUF"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in default args
    "N806",   # variable in function should be lowercase (conflicts with ML conventions)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]  # allow assert in tests
"ml/**" = ["N803", "N806"]  # allow uppercase variable names in ML code

[tool.ruff.lint.isort]
known-first-party = ["astronova_core"]
combine-as-imports = true

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = true
disallow_untyped_defs = true
disallow_any_generics = true
check_untyped_defs = true
no_implicit_optional = true
plugins = ["pydantic.mypy"]

[tool.mypy.overrides]
module = [
    "confluent_kafka.*",
    "astropy.*",
    "spacepy.*",
    "mlflow.*",
    "shap.*",
    "optuna.*",
    "xgboost.*",
    "chromadb.*",
]
ignore_missing_imports = true

[tool.black]
line-length = 100
target-version = ["py312"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | migrations
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["astronova_core"]
combine_as_imports = true
force_sort_within_sections = true

[tool.coverage.run]
source = ["services", "ml", "shared"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/migrations/*",
    "*/alembic/*",
    "setup.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "pass",
]
show_missing = true
fail_under = 70
