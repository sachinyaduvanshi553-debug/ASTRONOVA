version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: astronova
      POSTGRES_USER: astronova
      POSTGRES_PASSWORD: changeme_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    networks:
      - astronova-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - astronova-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - astronova-net

  gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://astronova:changeme_secure_password@postgres:5432/astronova
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
      - JWT_ALGORITHM=HS256
    depends_on:
      - postgres
      - redis
    networks:
      - astronova-net

  ingestion:
    build: ./services/ingestion
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://astronova:changeme_secure_password@postgres:5432/astronova
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - astronova-net

  forecasting:
    build: ./services/forecasting
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql+asyncpg://astronova:changeme_secure_password@postgres:5432/astronova
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - astronova-net

volumes:
  postgres_data:
  redis_data:

networks:
  astronova-net:
    driver: bridge
